# Exclude H2 console auto-config only (DataSource is handled by DatabaseConfig.java bean)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration

# JPA / Hibernate for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console
spring.h2.console.enabled=false

# Do not use H2 datasource URL in prod
# (The actual DataSource is built in DatabaseConfig.java from DATABASE_URL)
spring.datasource.url=
spring.datasource.username=
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# Port - Render assigns PORT dynamically
server.port=${PORT:8080}
