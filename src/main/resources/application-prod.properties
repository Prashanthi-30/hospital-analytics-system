# Exclude H2 and DataSource auto-configuration entirely in prod
# DatabaseConfig.java provides the DataSource bean manually from DATABASE_URL
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.h2.H2ConsoleAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# JPA / Hibernate for PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable H2 console
spring.h2.console.enabled=false

# Port - Render assigns PORT dynamically
server.port=${PORT:8080}
