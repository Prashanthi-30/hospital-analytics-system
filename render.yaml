services:
  - type: web
    name: hospital-analytics-system
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /api/doctors
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false # Set this to your deployed frontend URL (e.g. https://hospital-frontend.onrender.com)

databases:
  - name: hospital-db
    plan: free
    databaseName: hospitaldb
    user: hospitaluser
