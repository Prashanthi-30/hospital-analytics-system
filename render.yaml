services:
  - type: web
    name: hospital-analytics-system
    env: docker
    dockerContext: .
    dockerfilePath: Dockerfile
    plan: free
    healthCheckPath: /doctors
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: hospital-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://hospital-analytics-frontend.vercel.app

  - type: web
    name: hospital-analytics-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDir: hospital-analytics-frontend
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: hospital-analytics-system
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: hospital-db
    plan: free
    databaseName: hospitaldb
    user: hospitaluser
